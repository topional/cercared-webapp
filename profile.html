<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil | CercaRed</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body>

  <header class="site-header">
    <nav class="navbar" aria-label="Navegación principal">
      <a class="brand" href="index.html" aria-label="CercaRed inicio">
        <img class="brand-logo" src="assets/images/logo.png" alt="CercaRed" />
      </a>

      <button class="nav-toggle" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="nav-menu">
        <img class="nav-toggle-icon" src="assets/icons/menu.svg" alt="" aria-hidden="true" />
      </button>

      <div class="nav-menu" id="nav-menu">
        <a href="index.html">Catálogo</a>
        <a href="saved.html">Guardados</a>
        <a class="is-active" href="profile.html" aria-current="page">Mi perfil</a>
      </div>
    </nav>
  </header>

  <main class="profile-main">
    <div class="profile-container">
      
      <aside class="profile-sidebar">
        <div class="profile-card user-info-card">
          <div id="profileViewMode">
            <div class="user-avatar" id="userAvatar"></div>
            <h1 class="user-name" id="userName"></h1>
            <p class="user-email" id="userEmail"></p>
            
            <button class="btn-outline" id="btnEditProfile" type="button">Editar perfil</button>
            <button class="btn-accent" id="btnLogout" type="button">Cerrar sesion</button>
          </div>

        <form id="profileEditMode" class="hidden">
            <div class="avatar-edit-container">
              <div class="user-avatar" id="userAvatarEdit"></div>
              <label for="avatarUpload" class="avatar-upload-label">Cambiar foto</label>
              <input type="file" id="avatarUpload" accept="image/png, image/jpeg, image/webp" class="hidden" />
            </div>
            
            <div id="avatarErrorContainer" class="hidden" style="color: #D32F2F; font-size: 13px; text-align: center; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 6px;">
              <img src="assets/images/error.png" alt="Error" style="width: 20px; height: 20px;">
              <span>Imagen pesada. Elige una de menor resolución.</span>
            </div>
            
            <div class="form-group" style="width: 100%; text-align: left; margin-bottom: 24px;">
              <label for="editName">Nombre completo</label>
              <input type="text" id="editName" maxlength="40" required>
            </div>
            
            <button type="submit" class="btn-primary">Guardar cambios</button>
            <button type="button" class="btn-outline" id="btnCancelEdit">Cancelar</button>
          </form>
        </div>

        <div class="profile-card stats-card">
          <h2 class="stats-number">0</h2>
          <p class="stats-label">Servicios guardados</p>
          <button class="btn-primary" id="btnViewSaved" type="button">Ver mis servicios</button>
        </div>
      </aside>

      <section class="profile-content">
        
        <div class="profile-card">
          <h2 class="card-title">Preferencias</h2>
          
          <form id="preferencesForm" class="settings-form">
            <div class="form-row">
              <div class="form-group">
                <label for="district">Distrito de búsqueda por defecto</label>
                <input type="text" id="district" placeholder="Ej. San Juan de Lurigancho">
              </div>
              <div class="form-group">
                <label for="category">Categoría favorita</label>
                <input type="text" id="category" placeholder="Ej. Apoyo económico">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Tamaño de letra</label>
                <div class="toggle-group" id="fontSizeToggle">
                  <button type="button" class="btn-toggle active" data-value="normal" aria-pressed="true">Normal (16px)</button>
                  <button type="button" class="btn-toggle" data-value="large" aria-pressed="false">Grande (20px)</button>
                </div>
              </div>
              <div class="form-group">
                <label>Modo de vista</label>
                <div class="toggle-group" id="viewModeToggle">
                  <button type="button" class="btn-toggle active" data-value="normal" aria-pressed="true">Normal</button>
                  <button type="button" class="btn-toggle" data-value="simple" aria-pressed="false">Simple</button>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-accent btn-submit">Guardar preferencias</button>
          </form>
        </div>

        <div class="profile-card">
          <h2 class="card-title">Cambiar contraseña</h2>
          
          <form id="passwordForm" class="settings-form">
            <div class="form-group">
              <label for="currentPassword">Contraseña actual</label>
              <input type="password" id="currentPassword" placeholder="••••••••" aria-describedby="currentPasswordError">
              <span class="error-message" id="currentPasswordError" aria-live="polite"></span>
            </div>
            <div class="form-group">
              <label for="newPassword">Nueva contraseña</label>
              <input type="password" id="newPassword" placeholder="••••••••" aria-describedby="newPasswordError">
              <span class="error-message" id="newPasswordError" aria-live="polite"></span>
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirmar nueva contraseña</label>
              <input type="password" id="confirmPassword" placeholder="••••••••" aria-describedby="confirmPasswordError">
              <span class="error-message" id="confirmPasswordError" aria-live="polite"></span>
            </div>

            <button type="submit" class="btn-accent btn-submit full-width">Actualizar contraseña</button>
          </form>
        </div>

      </section>
    </div>
  </main>

  <main-footer></main-footer>

  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
